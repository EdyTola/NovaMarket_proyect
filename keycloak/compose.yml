name: ecom-keycloak

services:

  postgres-keycloak:
    image: postgres:16-alpine
    container_name: ecom-postgres-keycloak
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KC_DB_NAME:-keycloak_db}
      POSTGRES_USER: ${KC_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USER:-keycloak} -d ${KC_DB_NAME:-keycloak_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - ecom_keycloak_db_data:/var/lib/postgresql/data
    ports:
      - "25437:5432"
    networks:
      - ecom-keycloak-int

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.4
    container_name: ecom-keycloak
    restart: unless-stopped
    command: start --import-realm
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/${KC_DB_NAME:-keycloak_db}
      KC_DB_USERNAME: ${KC_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 28180
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "28180:8080"
    volumes:
      - ./realm:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; cat <&3 | grep -q '200'"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 120s
    networks:
      ecom-keycloak-int:
      ecom-prod-net:
        aliases:
          - keycloak

volumes:
  ecom_keycloak_db_data:

networks:
  ecom-keycloak-int:
    name: ecom-keycloak-int
  ecom-prod-net:
    external: true
    name: ecom-prod-net
