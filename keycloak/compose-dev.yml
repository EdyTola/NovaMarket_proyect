name: ecom-keycloak-dev

services:

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.4
    container_name: ecom-keycloak-dev
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 41880
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "41880:8080"
    volumes:
      - ./realm:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; cat <&3 | grep -q '200'"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 90s
    networks:
      ecom-dev-net:
        aliases:
          - keycloak

networks:
  ecom-dev-net:
    name: ecom-dev-net
