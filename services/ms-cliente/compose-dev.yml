name: ecom-cliente-dev

services:
  postgres-cliente-dev:
    image: postgres:16-alpine
    container_name: ecom-postgres-cliente-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecom_cliente_db
      POSTGRES_USER: ecom
      POSTGRES_PASSWORD: ecom
    ports:
      - "15436:5432"
    volumes:
      - ecom_cliente_dev_data:/var/lib/postgresql/data

volumes:
  ecom_cliente_dev_data:
